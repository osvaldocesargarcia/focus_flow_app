<div class="rounded-2xl glass border border-white/[0.07] overflow-hidden">

  <!-- Header / toggle -->
  <button
    (click)="toggle()"
    class="w-full flex items-center justify-between px-4 py-3
           hover:bg-white/5 transition-colors duration-200 cursor-pointer"
    [attr.aria-expanded]="isOpen()"
    [attr.aria-label]="i18n.t().scratchpad">

    <div class="flex items-center gap-3">
      <div class="w-7 h-7 rounded-xl bg-purple/15 flex items-center justify-center">
        <svg class="w-4 h-4 text-purple-lt" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.862 4.487 18.549 2.8a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125"/>
        </svg>
      </div>
      <div class="text-left">
        <p class="text-sm font-semibold text-text leading-none">{{ i18n.t().scratchpad }}</p>
        <p class="text-xs text-muted mt-0.5">{{ i18n.t().scratchpadHint }}</p>
      </div>
    </div>

    <svg
      class="w-4 h-4 text-muted transition-transform duration-300"
      [class.rotate-180]="isOpen()"
      viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="m19 9-7 7-7-7"/>
    </svg>
  </button>

  <!-- Collapsible content -->
  @if (isOpen()) {
    <div class="px-3 pb-3 anim-fade-up">
      <div class="flex justify-end mb-1.5 h-4">
        @if (notes().trim().length > 0) {
          <button
            (click)="clear()"
            class="text-xs text-muted hover:text-rose transition-colors duration-200 cursor-pointer">
            {{ i18n.t().scratchpadClear }}
          </button>
        }
      </div>
      <textarea
        [ngModel]="notes()"
        (ngModelChange)="notes.set($event)"
        rows="5"
        [placeholder]="i18n.t().scratchpadHint + '…'"
        class="w-full px-3 py-2.5 rounded-xl text-sm text-text resize-none
               bg-white/5 border border-white/8 placeholder-muted/50
               focus:outline-none focus:border-purple/50 focus:bg-white/8
               transition-all duration-200 leading-relaxed">
      </textarea>
    </div>
  }

</div>
