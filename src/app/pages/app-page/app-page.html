<!-- ════════════════════════════════════════════════════
     FocusFlow App — Main App Page
     ════════════════════════════════════════════════════ -->

<!-- Background noise/grain overlay (purely decorative) -->
<div class="fixed inset-0 pointer-events-none z-0 opacity-[0.025]"
     style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22n%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22 numOctaves=%224%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/%3E%3C/svg%3E');
     background-size: 200px 200px;"
     aria-hidden="true">
</div>

<!-- Ambient glows -->
<div class="fixed top-0 left-1/4 w-96 h-96 rounded-full pointer-events-none z-0
            opacity-[0.06] blur-3xl bg-purple"
     aria-hidden="true">
</div>
<div class="fixed bottom-0 right-1/4 w-80 h-80 rounded-full pointer-events-none z-0
            opacity-[0.04] blur-3xl bg-cyan"
     aria-hidden="true">
</div>

<!-- ── Main shell ── -->
<div class="relative z-10 flex flex-col min-h-dvh">

  <!-- ══ Header / Navbar ══ -->
  <header class="sticky top-0 z-40 w-full">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4">
      <div class="flex items-center justify-between h-12 px-4 sm:px-5 rounded-2xl glass shadow-lg">

        <!-- Logo (links back to Home) -->
        <a routerLink="/"
           class="flex items-center gap-2.5 cursor-pointer group">
          <div class="w-7 h-7 rounded-xl bg-gradient-to-br from-purple to-cyan flex items-center justify-center shadow-md
                      group-hover:scale-110 transition-transform duration-200">
            <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor">
              <path fill-rule="evenodd"
                d="M14.615 1.595a.75.75 0 0 1 .359.852L12.982 9.75h7.268a.75.75 0 0 1 .548 1.262l-10.5 11.25a.75.75 0 0 1-1.272-.71l1.992-7.302H3.818a.75.75 0 0 1-.548-1.262l10.5-11.25a.75.75 0 0 1 .845-.143Z"
                clip-rule="evenodd"/>
            </svg>
          </div>
          <span class="font-['Space_Grotesk'] font-bold text-base tracking-tight gradient-text">
            FocusFlow
          </span>
        </a>

        <!-- Actions -->
        <div class="flex items-center gap-2">

          <!-- Language toggle -->
          <button
            (click)="i18n.toggle()"
            class="w-9 h-9 rounded-xl flex items-center justify-center glass
                   hover:bg-white/10 transition-all duration-200 cursor-pointer overflow-hidden"
            [attr.aria-label]="'Switch to ' + (i18n.lang() === 'en' ? 'Portuguese' : 'English')">
            @if (i18n.lang() === 'en') {
              <!-- Portugal flag -->
              <svg class="w-5 h-4 rounded-sm" viewBox="0 0 20 14" xmlns="http://www.w3.org/2000/svg">
                <rect width="20" height="14" fill="#FF0000"/>
                <rect width="8" height="14" fill="#006600"/>
                <circle cx="8" cy="7" r="2.8" fill="#FFD700" stroke="#FFD700" stroke-width="0.3"/>
                <circle cx="8" cy="7" r="2.2" fill="#003399" stroke="#FFD700" stroke-width="0.4"/>
                <circle cx="8" cy="7" r="1.4" fill="none" stroke="#FFD700" stroke-width="0.5"/>
              </svg>
            } @else {
              <!-- USA flag -->
              <svg class="w-5 h-4 rounded-sm" viewBox="0 0 20 14" xmlns="http://www.w3.org/2000/svg">
                <rect width="20" height="14" fill="#FFFFFF"/>
                <rect width="20" height="1.08" y="0"    fill="#B22234"/>
                <rect width="20" height="1.08" y="2.15" fill="#B22234"/>
                <rect width="20" height="1.08" y="4.31" fill="#B22234"/>
                <rect width="20" height="1.08" y="6.46" fill="#B22234"/>
                <rect width="20" height="1.08" y="8.62" fill="#B22234"/>
                <rect width="20" height="1.08" y="10.77" fill="#B22234"/>
                <rect width="20" height="1.08" y="12.92" fill="#B22234"/>
                <rect width="8"  height="7.54" fill="#3C3B6E"/>
              </svg>
            }
          </button>

          <!-- Dark mode toggle -->
          <button
            (click)="theme.toggle()"
            class="w-9 h-9 rounded-xl flex items-center justify-center
                   text-muted hover:text-text glass hover:bg-white/10
                   transition-all duration-200 cursor-pointer"
            [attr.aria-label]="theme.isDark() ? i18n.t().lightMode : i18n.t().darkMode">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 [class]="theme.isDark() ? 'text-white' : 'text-black'">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z"/>
            </svg>
          </button>

        </div>
      </div>
    </div>
  </header>

  <!-- ══ Main content ══ -->
  <main class="flex-1 w-full max-w-5xl mx-auto px-4 sm:px-6 py-6 sm:py-8">

    <div class="grid grid-cols-1 lg:grid-cols-[400px_1fr] gap-6 lg:gap-8 items-start">

      <!-- ── Left: Timer card ── -->
      <div class="lg:sticky lg:top-28">
        <div class="p-6 sm:p-8 rounded-3xl glass shadow-xl glow-purple anim-fade-up">
          <p class="text-xs font-medium text-muted uppercase tracking-widest mb-6 text-center">
            Pomodoro
          </p>
          <app-timer/>
        </div>
      </div>

      <!-- ── Right: Task list ── -->
      <div class="min-h-[480px] anim-fade-up" style="animation-delay: 0.1s;">
        <div class="h-full p-5 sm:p-6 rounded-3xl glass shadow-xl">
          <app-task-list/>
        </div>
      </div>

    </div>
  </main>

  <!-- ══ Footer ══ -->
  <footer class="w-full max-w-5xl mx-auto px-4 sm:px-6 py-5 text-center">
    <p class="text-xs text-muted/50">
      FocusFlow &mdash; {{ i18n.t().appTagline }}
    </p>
  </footer>

</div>

<!-- ── Task Form Modal (rendered at root to escape backdrop-filter stacking contexts) ── -->
@if (taskService.showForm()) {
  <app-task-form
    [task]="taskService.editTarget()"
    (closed)="taskService.closeForm()"/>
}
